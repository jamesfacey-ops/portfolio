server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Contact form proxy to n8n
    location = /contact {
        proxy_pass http://10.0.0.130:5678/webhook/portfolio-contact;
        proxy_http_version 1.1;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Static file serving with fallback
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/png image/webp;
    gzip_comp_level 6;
    gzip_min_length 256;

    # Cache static assets (1yr immutable)
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2|ico|webp|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers must be repeated when add_header is used in a location block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    }

    # Security headers for HTML responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
}
