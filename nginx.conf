server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route /api/contact to n8n webhook
    # URL is __N8N_WEBHOOK_URL__ at build time — replaced by entrypoint.sh at runtime
    location /api/contact {
        proxy_pass __N8N_WEBHOOK_URL__;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_method POST;
        proxy_pass_request_body on;
        limit_req zone=contact burst=5 nodelay;  # zone defined in limits.conf
    }

    # Astro static pages
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    # Cache static assets (1yr + immutable)
    # NOTE: If you add add_header directives here, you MUST also repeat the server-level
    # security headers below — nginx resets inherited headers when a location defines its own.
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers — required for Cloudflare Turnstile
    # NOTE: 'unsafe-inline' on script-src is required for static Astro builds
    # (JSON-LD <script> tags + ContactForm inline <script> are not nonce-able in SSG).
    # Do NOT remove 'unsafe-inline' without adding CSP nonce support via a dynamic layer.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src https://challenges.cloudflare.com; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
