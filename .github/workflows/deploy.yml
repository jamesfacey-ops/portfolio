name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: self-hosted    # fraya-lxc runner — has Docker + LAN access to registry
    steps:
      - uses: actions/checkout@v4

      # Local registry (10.0.0.131:5000) uses no auth by default.
      # If auth is configured, uncomment:
      # - name: Login to registry
      #   run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login 10.0.0.131:5000 -u admin --password-stdin

      - name: Build and push
        run: |
          docker build \
            --build-arg AVAILABILITY_MESSAGE="${{ secrets.AVAILABILITY_MESSAGE }}" \
            --build-arg TURNSTILE_SITE_KEY="${{ secrets.TURNSTILE_SITE_KEY }}" \
            -t 10.0.0.131:5000/portfolio:latest .
          docker push 10.0.0.131:5000/portfolio:latest
          # N8N_WEBHOOK_URL is NOT a build arg — runtime env var set on fraya-lxc docker-compose
